name: RPC RDMA build

on:
  push:
    paths:
      - 'ggml/src/ggml-rpc/**'
      - 'tools/rpc/**'
  pull_request:
    paths:
      - 'ggml/src/ggml-rpc/**'
      - 'tools/rpc/**'

jobs:
  build-rdma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libibverbs-dev librdmacm-dev
      - name: Configure
        run: |
          cmake -S . -B build-rdma -DGGML_RPC=ON -DGGML_RPC_RDMA=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-rdma --config Release -j 2
